      <main class="container">
         <h2>Reserves vite  ta place!</h2>

          <form action="" class="booking-form">
             <label for="">Name</label>
             <input type="text" name="" id="" placeholder="Votre nom.." required>

             <label for="">Email</label>
             <input type="email" name="" id="" placeholder="Votre email.." required>

             <label for="">Room type</label>
             <select name="" id="">
                <option value="delux">Deluxe Room</option>
                <option value="executive">Deluxe Room</option>
                <option value="standard">Deluxe Room</option>
                <option value="queen">Deluxe Room</option>
                <option value="kind">Deluxe Room</option>
             </select>
             
             <label for="">Choissisez votre date d'entree
                <input type="date" required>
             </label>
            <label for="">Choissisez votre date de sortie</label>
                <input type="date" required>
            <button type="submit">Reservez maintenant</button>
          </form>


      </main>
